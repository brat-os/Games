<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Runner</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020107;
            font-family: 'Consolas', monospace;
            color: #ffffff;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(5, 2, 15, 0.85);
            padding: 15px 25px;
            border-radius: 6px;
            border: 1px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            pointer-events: none;
            z-index: 10;
        }
        h1 { margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; color: #00ffff; }
        .legend { margin: 2px 0 10px 0; font-size: 11px; color: #da70d6; text-transform: uppercase; letter-spacing: 1px; }
        p { margin: 3px 0; font-size: 13px; color: #ff007f; }
        
        #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(3, 1, 8, 0.95);
            border: 2px solid #ff007f;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.35);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            z-index: 5;
            display: none;
        }
    </style>
</head>
<body>

    <div id="hud">
        <h1>Drone Runner</h1>
        <div class="legend">by Alexandru Bratosin</div>
        <p>Distance Score: <span id="score-val">0</span>m</p>
        <p style="color: #00ffff;">Risk Multiplier: <span id="speed-val">1.0</span>x</p>
        <p style="color: #ffffff; margin-top: 5px;">• Vector Lift: W / S or Up / Down</p>
    </div>

    <div id="game-over-screen">
        <h2 style="color: #ff007f; margin: 0 0 10px 0; font-size: 26px;">SYSTEM IMPACT TERMINATION</h2>
        <p id="final-score" style="color: #ffffff; font-size: 14px; margin-bottom: 20px;"></p>
        <p style="color: #00ffff; font-size: 12px;">Press ANY KEY to reboot drone software</p>
    </div>

    <canvas id="flightCanvas"></canvas>

    <script>
        /**
         * @fileoverview Drone Runner (2D Side-Scroller Prototype)
         * @author Alexandru Bratosin
         * @description Pure 2D High-Speed Side-Scrolling Escalating Difficulty Flight Matrix
         */

        const canvas = document.getElementById('flightCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- AUDIO COMPONENT ---
        let audioCtx = null;
        let engineOsc = null;
        let engineGain = null;
        let lowPassFilter = null;
        let musicStep = 0;
        let musicInterval = null;

        const basslineNotes = [55.00, 55.00, 48.99, 48.99, 65.41, 65.41, 58.27, 51.91]; 

        function startAudioEngine() {
            if (audioCtx) {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                return; 
            }
            
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                engineOsc = audioCtx.createOscillator();
                engineGain = audioCtx.createGain();
                lowPassFilter = audioCtx.createBiquadFilter();
                
                engineOsc.type = 'triangle'; 
                engineOsc.frequency.setValueAtTime(65, audioCtx.currentTime); 
                
                lowPassFilter.type = 'lowpass';
                lowPassFilter.frequency.setValueAtTime(140, audioCtx.currentTime); 
                engineGain.gain.setValueAtTime(0.18, audioCtx.currentTime); 
                
                engineOsc.connect(lowPassFilter);
                lowPassFilter.connect(engineGain);
                engineGain.connect(audioCtx.destination);
                engineOsc.start();

                if (!musicInterval) {
                    musicInterval = setInterval(playMusicTick, 230);
                }
            } catch(e) {
                console.log("Audio waiting for player initialization...");
            }
        }

        function playMusicTick() {
            if (isGameOver || !audioCtx || audioCtx.state === 'suspended') return;
            try {
                let noteHz = basslineNotes[musicStep % basslineNotes.length];
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                let filter = audioCtx.createBiquadFilter();

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(noteHz, audioCtx.currentTime);
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(180, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.22);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.22);
                musicStep++;
            } catch(e) {}
        }

        function playScoreSound() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(1174.66, audioCtx.currentTime + 0.15); 
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } catch(e) {}
        }

        function playCrashSound() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            try {
                let bufferSize = audioCtx.sampleRate * 0.5; 
                let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                let data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
                let noiseNode = audioCtx.createBufferSource();
                noiseNode.buffer = buffer;
                let filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(200, audioCtx.currentTime);
                let gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                noiseNode.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                noiseNode.start();
            } catch(e) {}
        }

        // --- 2D SYSTEM MATRIX REGISTRY ---
        let score = 0;
        let isGameOver = false;
        let keys = {};
        let frameCount = 0;
        
        let scrollSpeed = 6.0; 
        let speedMultiplier = 1.0;

        const drone2D = {
            x: 120,
            y: window.innerHeight / 2,
            radius: 20,
            vy: 0,
            acceleration: 0.65,
            friction: 0.90
        };

        let obstacles = [];
        let backgroundStars = [];
        let nebulaPasses = [];

        function init2DEnvironment() {
            backgroundStars = [];
            nebulaPasses = [];
            obstacles = [];

            for (let i = 0; i < 120; i++) {
                backgroundStars.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    size: 1 + Math.random() * 2,
                    speed: 0.5 + Math.random() * 1.5
                });
            }

            for (let i = 0; i < 3; i++) {
                nebulaPasses.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    size: 120 + Math.random() * 100,
                    color: ['rgba(138, 43, 226, 0.06)', 'rgba(255, 0, 127, 0.04)', 'rgba(0, 255, 255, 0.04)'][i % 3]
                });
            }
        }
        init2DEnvironment();

        function spawnGateObstacle() {
            let gapHeight = 150; 
            let minimumBorder = 80;
            let targetY = minimumBorder + Math.random() * (canvas.height - gapHeight - (minimumBorder * 2));

            obstacles.push({
                x: canvas.width + 50,
                topY: targetY,
                gap: gapHeight,
                width: 45,
                passed: false,
                color: ['#00ffff', '#bd00ff', '#ff0055'][Math.floor(Math.random() * 3)]
            });
        }

        window.addEventListener('keydown', (e) => {
            startAudioEngine(); 
            if (isGameOver) {
                resetGame();
                return;
            }
            keys[e.key.toLowerCase()] = true;
            keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
            keys[e.key] = false;
        });

        function resetGame() {
            score = 0;
            scrollSpeed = 6.0;
            speedMultiplier = 1.0;
            isGameOver = false;
            drone2D.y = canvas.height / 2;
            drone2D.vy = 0;
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('speed-val').innerText = "1.0";
            if (engineGain) engineGain.gain.setValueAtTime(0.18, audioCtx.currentTime);
            init2DEnvironment();
            spawnGateObstacle();
        }

        function runGameLoop() {
            requestAnimationFrame(runGameLoop);
            frameCount++;

            ctx.fillStyle = '#020106';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            nebulaPasses.forEach(neb => {
                if (!isGameOver) neb.x -= scrollSpeed * 0.2;
                if (neb.x + neb.size < 0) { neb.x = canvas.width + neb.size; neb.y = Math.random() * canvas.height; }
                
                ctx.save();
                let glow = ctx.createRadialGradient(neb.x, neb.y, 5, neb.x, neb.y, neb.size);
                glow.addColorStop(0, neb.color);
                glow.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = glow;
                ctx.beginPath(); ctx.arc(neb.x, neb.y, neb.size, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            });

            ctx.fillStyle = '#ffffff';
            backgroundStars.forEach(star => {
                if (!isGameOver) star.x -= star.speed;
                if (star.x < 0) star.x = canvas.width;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });

            if (isGameOver) {
                drawObstacles();
                drawSideScrollerDrone();
                return;
            }

            if (keys['w'] || keys['arrowup']) drone2D.vy -= drone2D.acceleration;
            if (keys['s'] || keys['arrowdown']) drone2D.vy += drone2D.acceleration;

            drone2D.vy *= drone2D.friction;
            drone2D.y += drone2D.vy;

            if (drone2D.y - drone2D.radius < 0) { drone2D.y = drone2D.radius; drone2D.vy = 0; }
            if (drone2D.y + drone2D.radius > canvas.height) { drone2D.y = canvas.height - drone2D.radius; drone2D.vy = 0; }

            if (audioCtx && engineOsc) {
                let currentPitch = 65 + (Math.abs(drone2D.vy) * 4);
                engineOsc.frequency.setValueAtTime(currentPitch, audioCtx.currentTime);
            }

            let spawnWindow = Math.max(70, 150 - Math.floor(score * 0.4));
            if (frameCount % spawnWindow === 0) {
                spawnGateObstacle();
            }

            drawObstacles();

            obstacles.forEach(gate => {
                gate.x -= scrollSpeed;

                let withinXRange = (drone2D.x + drone2D.radius > gate.x) && (drone2D.x - drone2D.radius < gate.x + gate.width);
                let hittingTopPillar = drone2D.y - drone2D.radius < gate.topY;
                let hittingBottomPillar = drone2D.y + drone2D.radius > gate.topY + gate.gap;

                if (withinXRange && (hittingTopPillar || hittingBottomPillar)) {
                    isGameOver = true;
                    playCrashSound();
                    if (engineGain) engineGain.gain.setValueAtTime(0, audioCtx.currentTime);
                    document.getElementById('final-score').innerText = `Flight Path Cleared: ${score} meters`;
                    document.getElementById('game-over-screen').style.display = 'block';
                }

                if (!gate.passed && gate.x + gate.width < drone2D.x) {
                    gate.passed = true;
                    score += 50;
                    scrollSpeed += 0.4; 
                    speedMultiplier = (scrollSpeed / 6.0).toFixed(1);
                    document.getElementById('speed-val').innerText = speedMultiplier;
                    document.getElementById('score-val').innerText = score;
                    playScoreSound();
                }
            });

            if (obstacles.length > 0 && obstacles[0].x + obstacles[0].width < -100) {
                obstacles.shift();
            }

            drawSideScrollerDrone();
        }

        function drawObstacles() {
            obstacles.forEach(gate => {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = gate.color;
                ctx.fillStyle = gate.color;

                ctx.fillRect(gate.x, 0, gate.width, gate.topY);
                ctx.fillRect(gate.x, gate.topY + gate.gap, gate.width, canvas.height - (gate.topY + gate.gap));

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(gate.x - 2, gate.topY - 4, gate.width + 4, 4);
                ctx.fillRect(gate.x - 2, gate.topY + gate.gap, gate.width + 4, 4);
                ctx.restore();
            });
        }

        function drawSideScrollerDrone() {
            ctx.save();
            ctx.translate(drone2D.x, drone2D.y);

            let tiltRotation = drone2D.vy * 0.04;
            ctx.rotate(tiltRotation);

            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffff';

            ctx.fillStyle = '#1e212b';
            ctx.strokeStyle = '#090a0f';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-25, -6); ctx.lineTo(-15, -12); ctx.lineTo(15, -12); ctx.lineTo(25, 0);
            ctx.lineTo(15, 12); ctx.lineTo(-15, 12); ctx.lineTo(-25, 6);
            ctx.closePath(); ctx.fill(); ctx.stroke();

            ctx.strokeStyle = '#2d3244';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(-15, -12); ctx.lineTo(-5, 12);
            ctx.moveTo(-5, -12); ctx.lineTo(5, 12);
            ctx.moveTo(5, -12); ctx.lineTo(15, 12);
            ctx.stroke();

            ctx.fillStyle = '#10121a';
            ctx.strokeStyle = '#ff0055';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(-15, -12, 6, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(15, -12, 6, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

            ctx.strokeStyle = 'rgba(0, 255, 255, 0.45)';
            ctx.lineWidth = 1.5;
            let bladeOffset = Math.sin(Date.now() * 0.08) * 12;
            ctx.beginPath(); ctx.moveTo(-27, -12 + bladeOffset * 0.3); ctx.lineTo(-3, -12 - bladeOffset * 0.3); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(3, -12 - bladeOffset * 0.3); ctx.lineTo(27, -12 + bladeOffset * 0.3); ctx.stroke();

            ctx.fillStyle = isGameOver ? '#330011' : '#ff0055';
            ctx.shadowBlur = isGameOver ? 0 : 15;
            ctx.shadowColor = '#ff0055';
            ctx.fillRect(8, -5, 10, 5);

            ctx.restore();
        }

        runGameLoop();
    </script>
</body>
</html>
