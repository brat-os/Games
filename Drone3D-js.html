<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #010005;
            font-family: 'Consolas', monospace;
            color: #ffffff;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(4, 2, 10, 0.85);
            padding: 15px 25px;
            border-radius: 6px;
            border: 1px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            pointer-events: none;
            z-index: 10;
        }
        h1 { margin: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; color: #00ffff; }
        .legend { margin: 2px 0 10px 0; font-size: 11px; color: #da70d6; text-transform: uppercase; letter-spacing: 1px; }
        p { margin: 3px 0; font-size: 13px; color: #ff007f; }
        
        #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(3, 1, 8, 0.95);
            border: 2px solid #ff007f;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.35);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            z-index: 5;
            display: none;
        }
    </style>
</head>
<body>

    <div id="hud">
        <h1>Drone 3D</h1>
        <div class="legend">by Alexandru Bratosin</div>
        <p>Distance Flown: <span id="score-val">0</span>m</p>
        <p style="color: #00ffff;">Speed Factor: <span id="speed-val">1.0</span>x</p>
        <p style="color: #ffffff; margin-top: 5px;">• Steer: W,A,S,D / Arrows</p>
        <p style="color: #00ff66;">• PRESS ANY KEY TO ENGAGE AUDIO</p>
    </div>

    <div id="game-over-screen">
        <h2 style="color: #ff007f; margin: 0 0 10px 0; font-size: 26px;">HULL CRITICAL COLLISION</h2>
        <p id="final-score" style="color: #ffffff; font-size: 14px; margin-bottom: 20px;"></p>
        <p style="color: #00ffff; font-size: 12px;">Press ANY KEY to restart flight systems</p>
    </div>

    <canvas id="flightCanvas"></canvas>

    <script>
        /**
         * @fileoverview Drone 3D
         * @author Alexandru Bratosin
         * @description First-Person High-Speed Escalating Difficulty Flight Engine
         */

        const canvas = document.getElementById('flightCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- AUDIO COMPONENT ---
        let audioCtx = null;
        let engineOsc = null;
        let engineGain = null;
        let lowPassFilter = null;
        let musicStep = 0;
        let musicInterval = null;

        const basslineNotes = [55.00, 55.00, 48.99, 48.99, 65.41, 65.41, 58.27, 51.91]; 

        function startAudioEngine() {
            if (audioCtx) {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                return; 
            }
            
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                engineOsc = audioCtx.createOscillator();
                engineGain = audioCtx.createGain();
                lowPassFilter = audioCtx.createBiquadFilter();
                
                engineOsc.type = 'triangle'; 
                engineOsc.frequency.setValueAtTime(60, audioCtx.currentTime); 
                
                lowPassFilter.type = 'lowpass';
                lowPassFilter.frequency.setValueAtTime(130, audioCtx.currentTime); 
                engineGain.gain.setValueAtTime(0.18, audioCtx.currentTime); 
                
                engineOsc.connect(lowPassFilter);
                lowPassFilter.connect(engineGain);
                engineGain.connect(audioCtx.destination);
                engineOsc.start();

                if (!musicInterval) {
                    musicInterval = setInterval(playMusicTick, 230);
                }
            } catch(e) {
                console.log("Audio waiting for player gesture...");
            }
        }

        function playMusicTick() {
            if (isGameOver || !audioCtx || audioCtx.state === 'suspended') return;
            try {
                let noteHz = basslineNotes[musicStep % basslineNotes.length];
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                let filter = audioCtx.createBiquadFilter();

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(noteHz, audioCtx.currentTime);
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(180, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.22);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.22);
                musicStep++;
            } catch(e) {}
        }

        function playScoreSound() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.2); 
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } catch(e) {}
        }

        function playCrashSound() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            try {
                let bufferSize = audioCtx.sampleRate * 0.5; 
                let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                let data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
                let noiseNode = audioCtx.createBufferSource();
                noiseNode.buffer = buffer;
                let filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(200, audioCtx.currentTime);
                let gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                noiseNode.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                noiseNode.start();
            } catch(e) {}
        }

        // --- SYSTEM ENGINE VARIABLES ---
        let score = 0;
        let isGameOver = false;
        let keys = {};
        let frameCount = 0;
        
        let currentSpeed = 7.5; 
        let speedMultiplier = 1.0;

        const player = {
            x: 0,      
            y: 0,      
            vx: 0,
            vy: 0,
            speed: 0.85,
            friction: 0.88,
            bounds: 260 
        };

        let rings = [];
        let stars = [];
        let spaceNebulas = [];

        function initSpaceBackground() {
            stars = [];
            spaceNebulas = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * 1000,
                    y: (Math.random() - 0.5) * 1000,
                    z: Math.random() * 1000
                });
            }
            for (let i = 0; i < 4; i++) {
                spaceNebulas.push({
                    x: (Math.random() - 0.5) * 600,
                    y: (Math.random() - 0.5) * 400,
                    z: 800 + (i * 50),
                    size: 150 + Math.random() * 100,
                    color: ['rgba(138, 43, 226, 0.07)', 'rgba(255, 0, 127, 0.05)', 'rgba(0, 255, 255, 0.05)'][i % 3]
                });
            }
        }
        initSpaceBackground();

        function spawnRing() {
            let randomXSpread = (Math.random() - 0.5) * 320; 
            let randomYSpread = (Math.random() - 0.5) * 200;

            rings.push({
                x: randomXSpread, 
                y: randomYSpread,
                z: 1000,                         
                radius: 75, 
                color: ['#00ffff', '#bd00ff', '#ff0055'][Math.floor(Math.random() * 3)],
                pulse: 0,
                isPassing: false
            });
        }
        spawnRing(); 

        window.addEventListener('keydown', (e) => {
            startAudioEngine(); 
            if (isGameOver) {
                resetGame();
                return;
            }
            keys[e.key.toLowerCase()] = true;
            keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
            keys[e.key] = false;
        });

        function resetGame() {
            score = 0;
            currentSpeed = 7.5;
            speedMultiplier = 1.0;
            isGameOver = false;
            rings = [];
            player.x = 0; player.y = 0; player.vx = 0; player.vy = 0;
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('speed-val').innerText = "1.0";
            if (engineGain) engineGain.gain.setValueAtTime(0.18, audioCtx.currentTime);
            initSpaceBackground();
            spawnRing();
        }

        function frameUpdate() {
            requestAnimationFrame(frameUpdate);
            frameCount++;

            ctx.fillStyle = '#010004';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let centerX = canvas.width / 2;
            let centerY = canvas.height / 2;
            let focalLength = 400; 

            // 1. NEBULA LAYER RENDER
            spaceNebulas.forEach(neb => {
                if (!isGameOver) neb.z -= currentSpeed * 0.15; 
                if (neb.z <= 10) neb.z = 1000;

                let scale = focalLength / neb.z;
                let nx = centerX + (neb.x - player.x * 0.3) * scale;
                let ny = centerY + (neb.y - player.y * 0.3) * scale;

                ctx.save();
                let glow = ctx.createRadialGradient(nx, ny, 5, nx, ny, neb.size * scale);
                glow.addColorStop(0, neb.color);
                glow.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(nx, ny, neb.size * scale, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // 2. STARFIELD LAYER RENDER
            ctx.fillStyle = '#ffffff';
            stars.forEach(s => {
                if (!isGameOver) s.z -= currentSpeed; 
                if (s.z <= 0) {
                    s.z = 1000;
                    s.x = (Math.random() - 0.5) * 1000;
                    s.y = (Math.random() - 0.5) * 1000;
                }

                let scale = focalLength / s.z;
                let sx = centerX + (s.x - player.x) * scale;
                let sy = centerY + (s.y - player.y) * scale;

                if (sx >= 0 && sx < canvas.width && sy >= 0 && sy < canvas.height) {
                    let size = Math.max(1, 3 * scale);
                    ctx.globalAlpha = 1 - (s.z / 1000);
                    ctx.fillRect(sx, sy, size, size);
                }
            });
            ctx.globalAlpha = 1.0;

            if (isGameOver) {
                drawRings(centerX, centerY, focalLength);
                drawHUDCrosshair(centerX, centerY);
                drawDrone();
                return;
            }

            // CONTROLLER FORCES ACCELERATION
            if (keys['w'] || keys['arrowup']) player.vy -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.vy += player.speed;
            if (keys['a'] || keys['arrowleft']) player.vx -= player.speed;
            if (keys['d'] || keys['arrowright']) player.vx += player.speed;

            player.vx *= player.friction;
            player.vy *= player.friction;
            player.x += player.vx;
            player.y += player.vy;

            player.x = Math.max(-player.bounds, Math.min(player.bounds, player.x));
            player.y = Math.max(-player.bounds, Math.min(player.bounds, player.y));

            if (audioCtx && engineOsc) {
                let compositeVelocity = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
                let targetHz = 60 + (compositeVelocity * 2.5); 
                engineOsc.frequency.setValueAtTime(targetHz, audioCtx.currentTime);
            }

            let spawnWindow = Math.max(55, 120 - Math.floor(score * 0.05));
            if (frameCount % spawnWindow === 0) { spawnRing(); }

            drawRings(centerX, centerY, focalLength);

            rings.forEach((ring) => {
                if (!isGameOver) ring.z -= currentSpeed; 

                if (ring.z < 180 && !ring.isPassing) {
                    ring.isPassing = true;
                }

                if (ring.z <= currentSpeed && ring.z > 0) {
                    let dx = player.x - ring.x;
                    let dy = player.y - ring.y;
                    let deviationDistance = Math.sqrt(dx * dx + dy * dy);

                    if (deviationDistance > ring.radius) {
                        isGameOver = true;
                        playCrashSound();
                        if (engineGain) engineGain.gain.setValueAtTime(0, audioCtx.currentTime);
                        document.getElementById('final-score').innerText = `Total Depth Covered: ${score} meters`;
                        document.getElementById('game-over-screen').style.display = 'block';
                    } else {
                        score += 50;
                        currentSpeed += 0.5; 
                        speedMultiplier = (currentSpeed / 7.5).toFixed(1);
                        document.getElementById('speed-val').innerText = speedMultiplier;
                        
                        playScoreSound();
                        document.getElementById('score-val').innerText = score;
                    }
                }
            });

            if (rings.length > 0 && rings[0].z <= 0) { rings.shift(); }

            drawHUDCrosshair(centerX, centerY);
            drawDrone();
        }

        function drawRings(centerX, centerY, focalLength) {
            let sortedRings = [...rings].sort((a, b) => b.z - a.z);
            sortedRings.forEach(ring => {
                if (ring.z <= 10) return; 
                let scale = focalLength / ring.z;
                let rx = centerX + (ring.x - player.x) * scale;
                let ry = centerY + (ring.y - player.y) * scale;
                
                if (ring.isPassing) {
                    ring.pulse += 0.25;
                }
                let pulseScale = 1 + (Math.sin(ring.pulse) * 0.12 * (400 / ring.z));
                let radiusProjected = ring.radius * scale * pulseScale;

                ctx.save();
                ctx.shadowBlur = Math.max(5, 30 * scale); 
                ctx.shadowColor = ring.color;
                ctx.strokeStyle = ring.color;
                ctx.lineWidth = Math.max(2, 8 * scale);
                ctx.beginPath();
                ctx.arc(rx, ry, radiusProjected, 0, Math.PI * 2);
                ctx.stroke();

                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(rx, ry, Math.max(1, 3 * scale), 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        function drawHUDCrosshair(centerX, centerY) {
            ctx.save();
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.4)';
            ctx.lineWidth = 2;
            ctx.strokeRect(centerX - 15, centerY - 15, 30, 30);
            ctx.beginPath();
            ctx.moveTo(centerX - 40, centerY); ctx.lineTo(centerX - 20, centerY);
            ctx.moveTo(centerX + 20, centerY); ctx.lineTo(centerX + 40, centerY);
            ctx.moveTo(centerX, centerY - 40); ctx.lineTo(centerX, centerY - 20);
            ctx.moveTo(centerX, centerY + 20); ctx.lineTo(centerX, centerY + 40);
            ctx.stroke();
            ctx.fillStyle = '#ff007f';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawDrone() {
            ctx.save();
            
            let swayX = -player.vx * 3;
            let swayY = -player.vy * 3 + (Math.sin(Date.now() * 0.003) * 2.5);
            let bankingAngle = -player.vx * 0.02;

            ctx.translate(canvas.width / 2 + swayX, canvas.height + swayY);
            ctx.rotate(bankingAngle);

            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffff';

            // Chassis Frame Structure
            ctx.fillStyle = '#1e212b';
            ctx.strokeStyle = '#090a0f';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-canvas.width * 0.35, 0);
            ctx.lineTo(-canvas.width * 0.12, -70);
            ctx.lineTo(canvas.width * 0.12, -70);
            ctx.lineTo(canvas.width * 0.35, 0);
            ctx.lineTo(canvas.width * 0.18, 0);
            ctx.lineTo(0, -45);
            ctx.lineTo(-canvas.width * 0.18, 0);
            ctx.closePath();
            ctx.fill(); ctx.stroke();

            // Interlaced carbon texture bars
            ctx.strokeStyle = '#2d3244';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = -120; i <= 120; i += 15) {
                ctx.moveTo(i, -68); ctx.lineTo(i * 1.8, 0);
            }
            ctx.stroke();

            // Rotor Housings
            ctx.fillStyle = '#10121a';
            ctx.strokeStyle = '#ff0055';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.ellipse(-canvas.width * 0.14, -70, 30, 8, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(canvas.width * 0.14, -70, 30, 8, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

            // Fan Blade Spin Animations - CORRECTED TYPO HERE
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.35)';
            ctx.lineWidth = 2;
            let spinTime = Date.now() * 0.06;
            ctx.beginPath(); ctx.ellipse(-canvas.width * 0.14, -70, 26, 5, Math.sin(spinTime), 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(canvas.width * 0.14, -70, 26, 5, -Math.sin(spinTime), 0, Math.PI * 2); ctx.stroke();

            // Nose Shield Panel
            let panelGrad = ctx.createLinearGradient(0, -45, 0, 0);
            panelGrad.addColorStop(0, '#3a3f50');
            panelGrad.addColorStop(1, '#12141c');
            ctx.fillStyle = panelGrad;
            ctx.strokeStyle = '#090a0f';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(-55, 0); ctx.lineTo(-30, -42); ctx.lineTo(30, -42); ctx.lineTo(55, 0);
            ctx.closePath();
            ctx.fill(); ctx.stroke();

            // System Status HUD Visor Lens
            ctx.fillStyle = isGameOver ? '#330011' : '#ff0055';
            ctx.shadowBlur = isGameOver ? 0 : 20;
            ctx.shadowColor = '#ff0055';
            ctx.fillRect(-18, -34, 36, 10);

            ctx.restore();
        }

        frameUpdate();
    </script>
</body>
</html>
