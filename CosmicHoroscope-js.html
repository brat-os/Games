        // UI Target Components
        const picker = document.getElementById('zodiac-picker');
        const rerollBtn = document.getElementById('reroll-btn');
        const displayBox = document.getElementById('oracle-display');
        const titleEl = document.getElementById('sign-title');
        const metaEl = document.getElementById('prediction-meta');
        const textEl = document.getElementById('fortune-text');

        let activeSign = "";
        let targetedSignIndex = -1;
        
        // 3D Vault Configurations
        let stars = [];
        let zodiacConstellations = [];
        let projectedNodesCache = []; // Caches screen locations for click calculation raycasts
        
        let rotY = 0;   
        let rotX = 0.35; 
        
        // 3D Target Center Display State
        let centerSignGroup = null;

        // Initialize picker change logic
        picker.addEventListener('change', (e) => {
            selectSignByName(e.target.value);
        });

        rerollBtn.addEventListener('click', () => {
            if (activeSign) generateFortune();
        });

        // Combined selection machine state handler
        function selectSignByName(name) {
            activeSign = name;
            picker.value = name;
            rerollBtn.style.display = 'block';
            
            const keys = Object.keys(horoscopeDatabase);
            targetedSignIndex = keys.indexOf(name);
            
            // Re-instantiate the 3D projection model duplicate explicitly positioned in dead center space
            const originTemplate = zodiacConstellations[targetedSignIndex];
            centerSignGroup = {
                name: originTemplate.name,
                symbol: originTemplate.symbol,
                geometryStars: originTemplate.geometryStars.map(s => ({ ...s })),
                scaleUp: 0 // Used to animate scaling introduction properties cleanly
            };

            generateFortune();
        }

        function generateFortune() {
            const index = Math.floor(Math.random() * 30);
            const selectedText = horoscopeDatabase[activeSign][index];
            
            titleEl.innerText = activeSign.toUpperCase();
            metaEl.innerText = `Prediction Profile Alignment Matrix: Index #${index + 1} of 30`;
            textEl.innerText = selectedText;
            displayBox.style.display = 'block';
        }

        // Build Starfield Coordinates
        for (let i = 0; i < 400; i++) {
            stars.push({
                x: (Math.random() - 0.5) * 1200,
                y: (Math.random() - 0.5) * 1200,
                z: Math.random() * 800
            });
        }

        const ASCII_SYMBOLS = {
            Aries: "Aries ♈", Taurus: "Taurus ♉", Gemini: "Gemini ♊", Cancer: "Cancer ♋", Leo: "Leo ♌", Virgo: "Virgo ♍",
            Libra: "Libra ♎", Scorpio: "Scorpio ♏", Sagittarius: "Sagittarius ♐", Capricorn: "Capricorn ♑", Aquarius: "Aquarius ♒", Pisces: "Pisces ♓"
        };

        const signKeys = Object.keys(horoscopeDatabase);
        const vaultRadius = 260;

        for (let i = 0; i < 12; i++) {
            let theta = (i / 12) * Math.PI * 2;
            let localStars = [];
            let starCount = 6 + Math.floor(Math.random() * 4);
            
            for(let s=0; s<starCount; s++) {
                localStars.push({
                    dx: (Math.random() - 0.5) * 45,
                    dy: (Math.random() - 0.5) * 45,
                    dz: (Math.random() - 0.5) * 45
                });
            }

            zodiacConstellations.push({
                name: signKeys[i],
                symbol: ASCII_SYMBOLS[signKeys[i]],
                cx: Math.cos(theta) * vaultRadius,
                cy: 0,
                cz: Math.sin(theta) * vaultRadius,
                geometryStars: localStars
            });
        }

        // Mouse Press Coordinates Trackers (To distinguish click action vs drag cycles)
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let currentRotY = 0;
        let currentRotX = 0;

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'SELECT' || e.target.tagName === 'BUTTON') return;
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            currentRotY = rotY;
            currentRotX = rotX;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let dx = e.clientX - startX;
            let dy = e.clientY - startY;
            
            rotY = currentRotY + dx * 0.005;
            rotX = currentRotX + dy * 0.005;
            rotX = Math.max(-0.9, Math.min(0.9, rotX));
        });

        window.addEventListener('mouseup', (e) => {
            if (!isDragging) return;
            isDragging = false;

            // Compute distance variance: if cursor basically hasn't traveled, evaluate click event
            let deltaX = Math.abs(e.clientX - startX);
            let deltaY = Math.abs(e.clientY - startY);
            
            if (deltaX < 5 && deltaY < 5) {
                processRaycastClick(e.clientX, e.clientY);
            }
        });

        // --- 2. Raycast Intersection Coordinate Interception Engine ---
        function processRaycastClick(mouseX, mouseY) {
            let clickedSign = null;
            let closestDist = 45; // Maximum radial distance tolerance padding in pixels around the click coordinate

            projectedNodesCache.forEach(node => {
                let dx = mouseX - node.px;
                let dy = mouseY - node.py;
                let hitDistance = Math.sqrt(dx * dx + dy * dy);

                if (hitDistance < closestDist) {
                    closestDist = hitDistance;
                    clickedSign = node.name;
                }
            });

            if (clickedSign) {
                selectSignByName(clickedSign);
            }
        }

        // --- 3. Rendering Runtime Pacing Loops ---
        function drawUniverse() {
            requestAnimationFrame(drawUniverse);

            ctx.fillStyle = '#020106';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let centerX = canvas.width / 2;
            let centerY = canvas.height / 2;
            let elapsed = Date.now() * 0.0004;

            if (!isDragging) {
                rotY += 0.0012; // Slow background rotational glide speed
            }

            // A. Backdrop Stars rendering passes
            stars.forEach(s => {
                let scale = 450 / (s.z + 450);
                let sx = centerX + s.x * scale;
                let sy = centerY + s.y * scale;
                if (sx >= 0 && sx < canvas.width && sy >= 0 && sy < canvas.height) {
                    let blink = (1.2 * (1 - s.z / 800)) + (Math.sin(elapsed * 5 + s.x) * 0.3);
                    ctx.fillStyle = '#ffffff';
                    ctx.globalAlpha = 0.1 + (1 - s.z / 800) * 0.7;
                    ctx.fillRect(sx, sy, blink, blink);
                }
            });
            ctx.globalAlpha = 1.0;

            // B. Project Outer Ring Elements & Populate Calculation Caches
            projectedNodesCache = [];

            zodiacConstellations.forEach((con, idx) => {
                let x1 = con.cx * Math.cos(rotY) - con.cz * Math.sin(rotY);
                let z1 = con.cx * Math.sin(rotY) + con.cz * Math.cos(rotY);
                let y2 = con.cy * Math.cos(rotX) - z1 * Math.sin(rotX);
                let z2 = con.cy * Math.sin(rotX) + z1 * Math.cos(rotX);

                let isSelectedInUI = (idx === targetedSignIndex);
                if (isSelectedInUI) {
                    y2 += Math.sin(Date.now() * 0.005) * 8; // Float path sways
                }

                let scale = 500 / (z2 + 450);
                let px = centerX + x1 * scale;
                let py = centerY + y2 * scale;

                // Project localized constellation geometry nodes
                let subPoints = con.geometryStars.map(s => {
                    let sx = con.cx + s.dx;
                    let sy = con.cy + s.dy;
                    let sz = con.cz + s.dz;
                    if (isSelectedInUI) sy += Math.sin(Date.now() * 0.005) * 8;

                    let rx = sx * Math.cos(rotY) - sz * Math.sin(rotY);
                    let rz = sx * Math.sin(rotY) + sz * Math.cos(rotY);
                    let ry = sy * Math.cos(rotX) - rz * Math.sin(rotX);
                    let finalZ = sy * Math.sin(rotX) + rz * Math.cos(rotX);

                    return { x: centerX + rx * (500 / (finalZ + 450)), y: centerY + ry * (500 / (finalZ + 450)) };
                });

                projectedNodesCache.push({
                    name: con.name,
                    symbol: con.symbol,
                    index: idx,
                    px: px,
                    py: py,
                    pz: z2,
                    scale: scale,
                    subPoints: subPoints,
                    isFocused: isSelectedInUI
                });
            });

            // Sort depth configurations layer values
            projectedNodesCache.sort((a, b) => b.pz - a.pz);

            // C. Draw Interstitial Ring Guidelines & Network Grid paths
            projectedNodesCache.forEach(node => {
                let depthFadeAlpha = Math.max(0.08, 1 - (node.pz / vaultRadius));
                ctx.save();
                ctx.globalAlpha = node.isFocused ? 1.0 : depthFadeAlpha;

                // Render lines within the star collection group mapping
                ctx.lineWidth = node.isFocused ? 2 : 1;
                ctx.strokeStyle = node.isFocused ? '#00ffff' : 'rgba(138, 43, 226, 0.35)';
                for(let i = 0; i < node.subPoints.length - 1; i++) {
                    ctx.beginPath(); ctx.moveTo(node.subPoints[i].x, node.subPoints[i].y); ctx.lineTo(node.subPoints[i+1].x, node.subPoints[i+1].y); ctx.stroke();
                }
                ctx.beginPath(); ctx.moveTo(node.subPoints[node.subPoints.length-1].x, node.subPoints[node.subPoints.length-1].y); ctx.lineTo(node.subPoints[0].x, node.subPoints[0].y); ctx.stroke();

                // Draw tiny stars nodes points
                ctx.fillStyle = node.isFocused ? '#ffffff' : '#da70d6';
                node.subPoints.forEach(pt => {
                    ctx.beginPath(); ctx.arc(pt.x, pt.y, node.isFocused ? 3 : 1.5, 0, Math.PI * 2); ctx.fill();
                });

                // Display names floating above nodes mapping sites
                ctx.fillStyle = node.isFocused ? '#00ffff' : '#ffffff';
                ctx.font = node.isFocused ? 'bold 13px Consolas' : '10px Consolas';
                ctx.textAlign = 'center';
                ctx.fillText(node.symbol, node.px, node.py - 12);

                ctx.restore();
            });

            // D. FEATURE COMPONENT: Projected Focal Center Active Sign Model
            if (centerSignGroup) {
                // Interpolate scale values up to simulate smooth entry explosions zoom properties
                if (centerSignGroup.scaleUp < 1) {
                    centerSignGroup.scaleUp += (1 - centerSignGroup.scaleUp) * 0.08;
                }

                // Slowly spin the centered object independently along a stylized view pitch frame array
                let centerTime = Date.now() * 0.001;
                ctx.save();
                
                // Add a glowing energy portal background behind the center constellation
                let portalRad = 85 * centerSignGroup.scaleUp;
                let portalGlow = ctx.createRadialGradient(centerX, centerY, portalRad * 0.2, centerX, centerY, portalRad);
                portalGlow.addColorStop(0, 'rgba(138, 43, 226, 0.2)');
                portalGlow.addColorStop(0.5, 'rgba(0, 255, 255, 0.05)');
                portalGlow.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = portalGlow;
                ctx.beginPath(); ctx.arc(centerX, centerY, portalRad, 0, Math.PI * 2); ctx.fill();

                // Compute center coordinates map rotations matrix variations natively
                let centerRotatedPoints = centerSignGroup.geometryStars.map(s => {
                    // Spin along standard vertical coordinate offsets axis properties
                    let rx = s.dx * Math.cos(centerTime) - s.dz * Math.sin(centerTime);
                    let rz = s.dx * Math.sin(centerTime) + s.dz * Math.cos(centerTime);
                    // Magnify positions outwards matching entry scale multipliers
                    return {
                        x: centerX + (rx * 2.2 * centerSignGroup.scaleUp),
                        y: centerY + (s.dy * 2.2 * centerSignGroup.scaleUp) + (Math.sin(Date.now() * 0.003) * 5) // Float sways sync
                    };
                });

                // Draw central highlighted constellation linking paths outlines
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ffff';
                
                for(let i = 0; i < centerRotatedPoints.length - 1; i++) {
                    ctx.beginPath(); ctx.moveTo(centerRotatedPoints[i].x, centerRotatedPoints[i].y); ctx.lineTo(centerRotatedPoints[i+1].x, centerRotatedPoints[i+1].y); ctx.stroke();
                }
                ctx.beginPath(); ctx.moveTo(centerRotatedPoints[centerRotatedPoints.length-1].x, centerRotatedPoints[centerRotatedPoints.length-1].y); ctx.lineTo(centerRotatedPoints[0].x, centerRotatedPoints[0].y); ctx.stroke();

                // Draw solid star core points
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 8;
                centerRotatedPoints.forEach(pt => {
                    ctx.beginPath(); ctx.arc(pt.x, pt.y, 4.5, 0, Math.PI * 2); ctx.fill();
                });

                ctx.restore();
            }
        }

        drawUniverse();
    </script>
